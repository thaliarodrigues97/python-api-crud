apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api-crud
  labels:
    app: python-api-crud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-api-crud
  template:
    metadata:
      labels:
        app: python-api-crud
    spec:
      containers:
      - name: api
        image: python-api-crud:1.0.0
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
